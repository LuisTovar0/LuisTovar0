<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<script>
			// Resolve the theme before first paint (mirrors createLayoutState):
			// saved choice wins, otherwise fall back to the OS preference. Adding
			// `.light` here means both the page colors AND the theme icon render
			// correct on the first frame — the icon's morph is keyed off this class.
			(function () {
				try {
					var saved = localStorage.getItem('theme');
					var light = saved === 'light'
						|| (saved !== 'dark' && window.matchMedia('(prefers-color-scheme: light)').matches);
					if (light) {
						document.documentElement.classList.add('light');
					}
				} catch (_) {}
			})();
		</script>
		<link rel="stylesheet" href="%sveltekit.assets%/app.css">
		<link rel="icon" href="%sveltekit.assets%/favicon.ico"/>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Luís Tovar</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
